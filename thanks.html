<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Message sent — JW Guitar Lessons</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link rel="stylesheet" href="style.css">
<style>
  .thanks-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--brown); padding: 24px; }

</style>
</head>
<body>
<div class="thanks-wrap">
  <div class="thanks-box">
    <div class="icon">🎸</div>
    <h1>Message received!</h1>
    <p>Thanks for getting in touch. James will be back to you within 24 hours to arrange your free taster lesson.</p>
    <a href="/" class="btn btn-primary">Back to the site</a>
  </div>
</div>
